<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Summary App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center min-h-screen">
    <div class="bg-white/20 backdrop-blur-md p-8 rounded-lg shadow-lg max-w-md w-full text-center fade-in">
        <h1 class="text-3xl font-bold text-white mb-4">Wikipedia Summary App</h1>
        <form action="/api/summary" method="get" class="space-y-4">
            <label for="person_name" class="block text-white text-lg">Enter a name:</label>
            <input type="text" id="person_name" name="person_name" 
                   class="w-full p-3 rounded-lg border border-white/50 bg-white/10 text-white focus:outline-none focus:ring-2 focus:ring-purple-300 transition-all" 
                   placeholder="e.g. Albert Einstein" required>
            <button type="submit" 
                    class="w-full bg-white text-purple-600 font-semibold p-3 rounded-lg hover:bg-purple-700 hover:text-white transition-all shadow-lg">
                Search
            </button>
        </form>
    </div>
</body>
</html>
